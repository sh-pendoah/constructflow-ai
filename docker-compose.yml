version: '3.9'

services:
  # Infrastructure Services
  postgres:
    image: postgres:15-alpine
    container_name: worklight-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-worklight}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - worklight-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U admin -d worklight" ]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7.0
    container_name: worklight-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-password}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-worklighter}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - worklight-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: worklight-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - worklight-network
    command: redis-server --appendonly yes
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Application Services
  core-api:
    build:
      context: .
      dockerfile: docker/Dockerfile.core-api
    container_name: worklight-core-api
    environment:
      NODE_ENV: ${NODE_ENV:-staging}
      MONGO_URI: mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-password}@mongodb:27017/${MONGO_DB:-worklighter}?authSource=admin
      REDIS_URL: redis://redis:6379
      PORT: ${CORE_API_PORT:-3000}
    ports:
      - "${CORE_API_PORT:-3000}:3000"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - worklight-network
    volumes:
      - ./apps/api:/app
      - /app/node_modules
      - /app/build
    command: npm run dev:staging

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: worklight-frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000}
    ports:
      - "${FRONTEND_PORT:-3001}:3001"
    depends_on:
      - core-api
    networks:
      - worklight-network
    volumes:
      - ./apps/web:/app
      - /app/.next
      - /app/node_modules
    command: npm run dev:staging

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    container_name: worklight-worker
    environment:
      NODE_ENV: ${NODE_ENV:-staging}
      MONGO_URI: mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-password}@mongodb:27017/${MONGO_DB:-worklighter}?authSource=admin
      REDIS_HOST: redis
      REDIS_PORT: 6379
      OCR_PROVIDER: ${OCR_PROVIDER:-MOCK}
      LLM_PROVIDER: ${LLM_PROVIDER:-MOCK}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-5}
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - worklight-network
    restart: unless-stopped

  scheduler:
    build:
      context: .
      dockerfile: docker/Dockerfile.scheduler
    container_name: worklight-scheduler
    environment:
      NODE_ENV: ${NODE_ENV:-staging}
      MONGO_URI: mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-password}@mongodb:27017/${MONGO_DB:-worklighter}?authSource=admin
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@worklight.com}
      COMPLIANCE_CHECK_CRON: ${COMPLIANCE_CHECK_CRON:-0 9 * * *}
      SUMMARY_EMAIL_CRON: ${SUMMARY_EMAIL_CRON:-0 8 * * 1}
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - worklight-network
    restart: unless-stopped

networks:
  worklight-network:
    driver: bridge

volumes:
  postgres_data:
  mongodb_data:
  mongodb_config:
  redis_data:
