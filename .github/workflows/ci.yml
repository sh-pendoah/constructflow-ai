name: CI — PR and Merge Pipeline (2026 Playbook)
# §5.1 Required stages: lint + unit + integration + security + docker build (on merge)
# §7   Security: OIDC to Azure, dependency review, SBOM, container scan
# §12  Caching: pnpm store + Docker layer caching

on:
  push:
    branches: [ main, 'ab/**', 'copilot/**' ]
    paths:
      - 'apps/**'
      - 'libs/**'
      - 'infra/**'
      - 'nx.json'
      - 'pnpm-workspace.yaml'
      - 'package.json'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'apps/**'
      - 'libs/**'
      - 'infra/**'
      - 'nx.json'
      - 'pnpm-workspace.yaml'
      - 'package.json'
      - '.github/workflows/ci.yml'

permissions:
  contents: read
  pull-requests: read

env:
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  lint-and-build:
    name: Lint and Build (Nx Affected)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint affected projects
        run: pnpm lint:affected

      - name: Build affected projects
        run: pnpm build:affected
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3000

      - name: Archive build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-${{ github.sha }}
          path: |
            apps/api/build/
            apps/worker/dist/
            apps/scheduler/dist/
            apps/web/.next/
            libs/*/dist/
          retention-days: 7

  unit-tests:
    name: Unit Tests (Nx Affected)
    runs-on: ubuntu-latest
    needs: lint-and-build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests on affected projects
        run: pnpm test:affected

  dependency-review:
    name: Dependency Review (supply chain)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          deny-licenses: GPL-3.0, AGPL-3.0

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint-and-build
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run pnpm audit
        run: pnpm audit --audit-level=high

  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: lint-and-build

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        env:
          MONGO_INITDB_ROOT_USERNAME: admin
          MONGO_INITDB_ROOT_PASSWORD: password
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start services
        run: |
          pnpm dev:api &
          pnpm dev:web &
          sleep 30
        env:
          MONGO_URI: mongodb://admin:password@localhost:27017/docflow-360?authSource=admin
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret-key
          PORT: 3000

      - name: Run Playwright E2E tests
        run: pnpm test:e2e
        env:
          BASE_URL: http://localhost:3001
          TEST_USER_EMAIL: test@docflow-360.local
          TEST_USER_PASSWORD: Test1234$

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ github.sha }}
          path: test-results/
          retention-days: 7

  docker-build:
    name: Build and Scan Docker Images
    runs-on: ubuntu-latest
    needs: [lint-and-build, unit-tests, security-scan]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
      security-events: write

    strategy:
      matrix:
        app: [api, worker, scheduler, web]
        include:
          - app: api
            dockerfile: Dockerfile.api
            context: .
          - app: worker
            dockerfile: Dockerfile.worker
            context: .
          - app: scheduler
            dockerfile: Dockerfile.scheduler
            context: .
          - app: web
            dockerfile: apps/web/Dockerfile
            context: .

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.app }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.app }}:latest
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Run Trivy container scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.app }}:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-${{ matrix.app }}.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'  # report only; harden to '1' after baseline vulnerabilities are addressed

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-${{ matrix.app }}.sarif
          category: trivy-${{ matrix.app }}

  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    needs: [lint-and-build, unit-tests]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate SBOM (CycloneDX)
        run: npx @cyclonedx/cyclonedx-npm --output-format json --output-file sbom.json
        continue-on-error: true

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: sbom.json
          retention-days: 90

  status-check:
    name: All Required Checks Passed
    runs-on: ubuntu-latest
    needs: [lint-and-build, unit-tests, security-scan]
    if: always()

    steps:
      - name: Check required jobs
        run: |
          if [ "${{ needs.lint-and-build.result }}" != "success" ]; then
            echo "Build/lint failed"
            exit 1
          fi
          if [ "${{ needs.unit-tests.result }}" != "success" ] && [ "${{ needs.unit-tests.result }}" != "skipped" ]; then
            echo "Unit tests failed"
            exit 1
          fi
          if [ "${{ needs.security-scan.result }}" != "success" ] && [ "${{ needs.security-scan.result }}" != "skipped" ]; then
            echo "Security scan failed"
            exit 1
          fi
          echo "All required checks passed"
