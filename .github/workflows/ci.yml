name: Worklight CI/CD Pipeline

on:
  push:
    branches: [ main, develop, 'copilot/**' ]
  pull_request:
    branches: [ main, develop ]

env:
  NODE_VERSION: '20'

jobs:
  lint-and-build:
    name: Lint and Build All Services
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install root dependencies
        run: npm install

      - name: Install all service dependencies
        run: |
          cd apps/api && npm install
          cd ../web && npm install
          cd ../landing && npm install
          cd ../worker && npm install
          cd ../scheduler && npm install

      - name: Lint core-api
        run: cd apps/api && npm run lint --if-present
        continue-on-error: true

      - name: Build core-api
        run: npm run build:api

      - name: Build worker
        run: npm run build:worker

      - name: Build scheduler
        run: npm run build:scheduler

      - name: Build frontend
        run: npm run build:web
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3000

      - name: Build landing-page
        run: npm run build:landing

      - name: Archive build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            apps/api/build/
            apps/worker/dist/
            apps/scheduler/dist/
            apps/web/.next/
            apps/landing/dist/
          retention-days: 7

  unit-tests:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    needs: lint-and-build
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install
          cd apps/api && npm install
          cd ../web && npm install
          cd ../worker && npm install
          cd ../scheduler && npm install

      - name: Run core-api tests
        run: cd apps/api && npm test --if-present
        continue-on-error: true

      - name: Run frontend tests
        run: cd apps/web && npm test --if-present
        continue-on-error: true

      - name: Run worker tests
        run: cd apps/worker && npm test --if-present
        continue-on-error: true

      - name: Run scheduler tests
        run: cd apps/scheduler && npm test --if-present
        continue-on-error: true

  e2e-tests:
    name: Run E2E Tests
    runs-on: ubuntu-latest
    needs: lint-and-build
    
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        env:
          MONGO_INITDB_ROOT_USERNAME: admin
          MONGO_INITDB_ROOT_PASSWORD: password
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install
          cd apps/web && npm install
          cd ../api && npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start services
        run: |
          # Start core-api in background
          cd apps/api && npm run dev &
          
          # Start frontend in background
          cd apps/web && npm run dev &
          
          # Wait for services to be ready
          sleep 30
        env:
          MONGO_URI: mongodb://admin:password@localhost:27017/worklighter?authSource=admin
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret-key
          PORT: 3000

      - name: Run Playwright E2E tests
        run: npx playwright test
        env:
          BASE_URL: http://localhost:3001
          TEST_USER_EMAIL: test@worklight.com
          TEST_USER_PASSWORD: Test1234$

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: test-results/
          retention-days: 7

  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [lint-and-build, unit-tests]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub (optional)
        uses: docker/login-action@v3
        if: env.DOCKER_USERNAME != ''
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
        continue-on-error: true

      - name: Build core-api image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/api
          push: false
          tags: worklight-core-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build worker image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/worker
          push: false
          tags: worklight-worker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build scheduler image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/scheduler
          push: false
          tags: worklight-scheduler:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/web
          push: false
          tags: worklight-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build landing-page image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/landing
          push: false
          tags: worklight-landing-page:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    needs: lint-and-build
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run npm audit
        run: |
          npm audit --audit-level=moderate || true
          cd apps/api && npm audit --audit-level=moderate || true
          cd ../web && npm audit --audit-level=moderate || true
        continue-on-error: true

      - name: Run Snyk security scan (if configured)
        if: env.SNYK_TOKEN != ''
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high
        continue-on-error: true

  status-check:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs: [lint-and-build, unit-tests, e2e-tests, security-scan]
    if: always()
    
    steps:
      - name: Check all jobs status
        run: |
          if [ "${{ needs.lint-and-build.result }}" != "success" ]; then
            echo "Build failed"
            exit 1
          fi
          if [ "${{ needs.unit-tests.result }}" != "success" ] && [ "${{ needs.unit-tests.result }}" != "skipped" ]; then
            echo "Unit tests failed"
            exit 1
          fi
          if [ "${{ needs.e2e-tests.result }}" != "success" ] && [ "${{ needs.e2e-tests.result }}" != "skipped" ]; then
            echo "E2E tests failed"
            exit 1
          fi
          echo "All checks passed!"
