name: Nightly — Regression, Performance and AI Evals (2026 Playbook §5.1)
# Runs the full test suite including performance baselines and AI eval suite.
# Results gate the next day's stg→prd promotions via required status check.

on:
  schedule:
    # 02:00 UTC every night (off-peak for ACA/Azure cost; daylight for US/EU devs)
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      skip_perf:
        description: 'Skip k6 performance tests'
        required: false
        default: 'false'
      skip_ai_evals:
        description: 'Skip AI eval suite'
        required: false
        default: 'false'

permissions:
  contents: read
  checks: write

env:
  NODE_VERSION: '20'

jobs:
  # ── Full regression (all tests, not just affected) ───────────────────────────
  full-regression:
    name: Full Regression Test Suite
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        env:
          MONGO_INITDB_ROOT_USERNAME: admin
          MONGO_INITDB_ROOT_PASSWORD: password
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Run ALL tests (not just affected) for nightly full regression
      - name: Run full unit test suite
        run: pnpm test
        env:
          MONGO_URI: mongodb://admin:password@localhost:27017/docflow-360?authSource=admin
          REDIS_URL: redis://localhost:6379

  # ── E2E full suite (Playwright, cross-browser) ───────────────────────────────
  e2e-full:
    name: Full E2E Suite (Playwright)
    runs-on: ubuntu-latest
    needs: full-regression

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        env:
          MONGO_INITDB_ROOT_USERNAME: admin
          MONGO_INITDB_ROOT_PASSWORD: password
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Install all browsers for full cross-browser coverage
      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Start services
        run: |
          pnpm dev:api &
          pnpm dev:web &
          sleep 30
        env:
          MONGO_URI: mongodb://admin:password@localhost:27017/docflow-360?authSource=admin
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: nightly-test-secret
          PORT: 3000

      - name: Run full Playwright suite (all browsers)
        run: pnpm test:e2e
        env:
          BASE_URL: http://localhost:3001
          TEST_USER_EMAIL: test@docflow-360.local
          TEST_USER_PASSWORD: Test1234$

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nightly-playwright-report
          path: test-results/
          retention-days: 14

  # ── Performance baselines (k6) ───────────────────────────────────────────────
  performance:
    name: Performance Baselines (k6)
    runs-on: ubuntu-latest
    needs: full-regression
    if: inputs.skip_perf != 'true'

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        env:
          MONGO_INITDB_ROOT_USERNAME: admin
          MONGO_INITDB_ROOT_PASSWORD: password
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install k6
        run: |
          curl https://github.com/grafana/k6/releases/download/v0.54.0/k6-v0.54.0-linux-amd64.tar.gz -L | tar xvz --strip-components 1
          sudo mv k6 /usr/local/bin/

      - name: Start API service
        run: |
          pnpm dev:api &
          sleep 20
        env:
          MONGO_URI: mongodb://admin:password@localhost:27017/docflow-360?authSource=admin
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: nightly-perf-secret
          PORT: 3000

      - name: Run k6 performance baselines
        run: k6 run tests/performance/k6-health.js --out json=k6-results.json
        env:
          K6_API_BASE: http://localhost:3000

      - name: Upload k6 results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: k6-results
          path: k6-results.json
          retention-days: 30

  # ── AI eval suite ────────────────────────────────────────────────────────────
  ai-evals:
    name: AI Eval Suite (hallucination, faithfulness, safety)
    runs-on: ubuntu-latest
    needs: full-regression
    if: inputs.skip_ai_evals != 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # AI evals require Azure OpenAI access; skip if credentials not configured.
      # This keeps nightly non-blocking for forks and PR builds.
      - name: Run AI eval suite
        if: env.AZURE_OPENAI_API_KEY != ''
        run: |
          cd apps/ai-runtime
          pnpm run eval 2>/dev/null || echo "No eval script configured yet — add 'eval' to apps/ai-runtime/package.json"
        env:
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}

      - name: Upload eval results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ai-eval-results
          path: apps/ai-runtime/eval-results/
          retention-days: 30

  # ── Nightly gate ─────────────────────────────────────────────────────────────
  nightly-gate:
    name: Nightly Gate — All Checks
    runs-on: ubuntu-latest
    needs: [full-regression, e2e-full, performance, ai-evals]
    if: always()

    steps:
      - name: Evaluate nightly results
        run: |
          FAILED=0
          if [ "${{ needs.full-regression.result }}" != "success" ]; then
            echo "Full regression failed"
            FAILED=1
          fi
          if [ "${{ needs.e2e-full.result }}" != "success" ]; then
            echo "E2E full suite failed"
            FAILED=1
          fi
          if [ "${{ needs.performance.result }}" = "failure" ]; then
            echo "Performance baselines failed"
            FAILED=1
          fi
          if [ "$FAILED" -eq 1 ]; then
            echo "Nightly gate FAILED — promote workflow will be blocked"
            exit 1
          fi
          echo "Nightly gate PASSED"
